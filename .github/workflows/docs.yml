name: Docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/Main.hs'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'requirements-docs.txt'
      - 'scripts/generate-runnable-comparisons.py'
  pull_request:
    paths:
      - 'app/Main.hs'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'requirements-docs.txt'
      - 'scripts/generate-runnable-comparisons.py'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Regenerate runnable comparisons page
        run: python3 scripts/generate-runnable-comparisons.py

      - name: Verify generated docs are committed
        run: git diff --exit-code -- docs/runnable-comparisons.md

      - name: Build docs
        run: mkdocs build --strict
