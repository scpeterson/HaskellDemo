name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create, for example v0.1.0
        required: true
      title:
        description: Release title
        required: true
      notes:
        description: Release notes
        required: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          case "$VERSION" in
            v*) ;;
            *)
              echo "Release tags must start with v, for example v0.1.0"
              exit 1
              ;;
          esac

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
          TITLE: ${{ inputs.title }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$TITLE"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          TITLE: ${{ inputs.title }}
          NOTES: ${{ inputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            gh release create "$VERSION" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$VERSION" --title "$TITLE" --generate-notes
          fi
